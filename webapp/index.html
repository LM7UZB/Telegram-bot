
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TillaBazar - Premium Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            scrollbar-width: none;
            background-color: #050505;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        /* Mesh background blobs */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.08) 0px, transparent 50%),
                        radial-gradient(at 50% 50%, rgba(147, 51, 234, 0.05) 0px, transparent 50%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Royal Guard Shimmer Effect */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .animate-shimmer {
            background: linear-gradient(
                90deg, 
                #d4af37 0%, 
                #f0e68c 25%, 
                #ffffff 50%, 
                #f0e68c 75%, 
                #d4af37 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease-out;
        }

        /* Running Fly-to-Cart Animation */
        @keyframes fly-to-cart {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
                filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8));
            }
            30% {
                transform: translate(var(--mid-x), var(--mid-y)) scale(1.2) rotate(45deg);
                opacity: 0.95;
                filter: drop-shadow(0 0 25px rgba(212, 175, 55, 1));
            }
            100% {
                transform: translate(var(--dest-x), var(--dest-y)) scale(0.1) rotate(270deg);
                opacity: 0.1;
                filter: drop-shadow(0 0 2px rgba(212, 175, 55, 0));
            }
        }
        .fly-item {
            position: fixed;
            animation: fly-to-cart 1.0s cubic-bezier(0.25, 1, 0.25, 1) forwards;
            pointer-events: none;
            z-index: 9999;
            will-change: transform, opacity;
        }

        /* Cart button dynamic impact shake */
        @keyframes cart-pop {
            0% { transform: scale(1); }
            30% { transform: scale(1.35) rotate(-10deg); }
            60% { transform: scale(1.35) rotate(10deg); }
            80% { transform: scale(0.95) rotate(0deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .animate-cart-pop {
            animation: cart-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
